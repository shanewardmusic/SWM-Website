<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101525" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SWM Tuner" />
  <link rel="manifest" href="tuner.webmanifest" />
  <link rel="apple-touch-icon" href="swm-logo.jpeg" />
  <title>SWM Tuner</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #a9b4c7;
      --subtle: #758199;
      --bg: #090d16;
      --surface: rgba(17, 23, 38, 0.82);
      --surface-strong: rgba(23, 31, 51, 0.96);
      --line: rgba(255, 255, 255, 0.12);
      --blue: #168ce6;
      --blue-deep: #315bce;
      --violet: #8627d8;
      --cyan: #41d8ff;
      --green: #48e5a1;
      --amber: #f5c15c;
      --red: #ff6f86;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.36);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: var(--font);
      background:
        linear-gradient(120deg, rgba(22, 140, 230, 0.16), transparent 36%),
        linear-gradient(230deg, rgba(134, 39, 216, 0.18), transparent 42%),
        #090d16;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), transparent 80%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(9, 13, 22, 0.1), #090d16 88%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.075);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      border-color: rgba(65, 216, 255, 0.34);
      background: rgba(255, 255, 255, 0.11);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.44;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.075);
      padding: 0 12px;
      outline: none;
      accent-color: var(--cyan);
    }

    input:focus,
    select:focus {
      border-color: rgba(65, 216, 255, 0.78);
      box-shadow: 0 0 0 3px rgba(65, 216, 255, 0.13);
    }

    select option {
      color: #101525;
      background: #f8fbff;
    }

    label {
      display: block;
      margin: 0 0 7px;
      color: #dce6f7;
      font-size: 0.78rem;
      font-weight: 760;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
      display: grid;
      gap: 14px;
    }

    .shell {
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 54px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: min(172px, 46vw);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 24px rgba(65, 216, 255, 0.14));
    }

    .brand-mark {
      min-width: 0;
      display: grid;
      gap: 1px;
    }

    .brand-title {
      color: #eef6ff;
      font-size: 0.78rem;
      font-weight: 820;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-pill {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #dbe8fb;
      background: rgba(255, 255, 255, 0.07);
      font-size: 0.79rem;
      font-weight: 760;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(245, 193, 92, 0.12);
    }

    .status-pill.active .status-dot {
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(72, 229, 161, 0.13);
    }

    .tuner-stage {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.045)),
        rgba(13, 18, 31, 0.86);
      box-shadow: var(--shadow);
    }

    .tuner-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(65, 216, 255, 0.12), transparent),
        linear-gradient(180deg, rgba(134, 39, 216, 0.12), transparent 55%);
      opacity: 0.72;
    }

    .meter {
      position: relative;
      z-index: 1;
      min-height: clamp(390px, 64vh, 610px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 18px 14px;
    }

    .readout {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .mini-stat {
      min-height: 44px;
      display: grid;
      align-content: center;
      gap: 1px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.055);
    }

    .mini-stat:last-child {
      text-align: right;
    }

    .mini-stat span {
      color: var(--subtle);
      font-size: 0.68rem;
      font-weight: 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mini-stat strong {
      color: #f8fbff;
      font-size: clamp(0.92rem, 4vw, 1.18rem);
      line-height: 1.1;
    }

    .note-badge {
      min-width: 116px;
      display: grid;
      place-items: center;
      padding: 9px 12px 11px;
      border: 1px solid rgba(65, 216, 255, 0.26);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(22, 140, 230, 0.18), rgba(134, 39, 216, 0.16)),
        rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .note-name {
      font-size: clamp(3.4rem, 19vw, 5.7rem);
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .octave {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 820;
      letter-spacing: 0.08em;
    }

    .needle-view,
    .strobe-view {
      grid-row: 2;
      align-self: stretch;
      min-height: 0;
    }

    .needle-view {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
    }

    .gauge {
      position: relative;
      min-height: 210px;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .gauge::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: min(520px, 128vw);
      aspect-ratio: 2 / 1;
      transform: translateX(-50%);
      border-radius: 999px 999px 0 0;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(9, 13, 22, 0.94) 0 42%, transparent 43%),
        conic-gradient(from 240deg at 50% 100%,
          rgba(255, 111, 134, 0.62) 0deg,
          rgba(245, 193, 92, 0.76) 35deg,
          rgba(72, 229, 161, 0.94) 58deg,
          rgba(245, 193, 92, 0.76) 81deg,
          rgba(255, 111, 134, 0.62) 120deg,
          transparent 121deg);
      opacity: 0.88;
      filter: saturate(1.08);
    }

    .ticks {
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: min(520px, 128vw);
      aspect-ratio: 2 / 1;
      transform: translateX(-50%);
    }

    .tick {
      --angle: 0deg;
      --height: 18px;
      --alpha: 0.48;
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 2px;
      height: 50%;
      transform-origin: 50% 100%;
      transform: rotate(var(--angle));
    }

    .tick::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: var(--height);
      transform: translateX(-50%);
      background: rgba(255, 255, 255, var(--alpha));
      border-radius: 999px;
    }

    .tick.major {
      --height: 30px;
      --alpha: 0.78;
    }

    .tick.center {
      --height: 42px;
      --alpha: 1;
    }

    .needle {
      --needle-angle: 0deg;
      position: absolute;
      left: 50%;
      bottom: 17%;
      width: 5px;
      height: min(232px, 45vw);
      transform-origin: 50% 100%;
      transform: translateX(-50%) rotate(var(--needle-angle));
      border-radius: 999px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0), #fff 18%, var(--cyan) 100%);
      box-shadow: 0 0 22px rgba(65, 216, 255, 0.55);
      transition: transform 110ms ease-out;
    }

    .needle::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -13px;
      width: 30px;
      height: 30px;
      transform: translateX(-50%);
      border: 2px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background: radial-gradient(circle, #fff 0 16%, #41d8ff 17% 35%, #101525 36%);
      box-shadow: 0 0 20px rgba(65, 216, 255, 0.32);
    }

    .cents-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .cents-row span:nth-child(2) {
      min-width: 108px;
      color: #f8fbff;
      text-align: center;
      font-size: clamp(1.18rem, 5vw, 1.7rem);
      font-weight: 900;
    }

    .strobe-view {
      display: none;
      align-content: center;
      gap: 14px;
      overflow: hidden;
    }

    .strobe-window {
      position: relative;
      height: clamp(230px, 45vh, 365px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      background: #090d16;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.48);
    }

    .strobe-window::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right, rgba(9, 13, 22, 0.84), transparent 20%, transparent 80%, rgba(9, 13, 22, 0.84)),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.08), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.24));
    }

    .strobe-band {
      --offset: 0px;
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg,
          rgba(65, 216, 255, 0.15) 0,
          rgba(65, 216, 255, 0.15) 13px,
          rgba(255, 255, 255, 0.78) 14px,
          rgba(255, 255, 255, 0.78) 18px,
          rgba(134, 39, 216, 0.18) 19px,
          rgba(134, 39, 216, 0.18) 34px,
          rgba(255, 255, 255, 0.08) 35px,
          rgba(255, 255, 255, 0.08) 44px);
      transform: translateX(var(--offset));
      filter: drop-shadow(0 0 18px rgba(65, 216, 255, 0.36));
      will-change: transform;
    }

    .strobe-center {
      position: absolute;
      inset: 0 auto 0 50%;
      z-index: 2;
      width: 2px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, transparent, rgba(72, 229, 161, 0.9), transparent);
      box-shadow: 0 0 20px rgba(72, 229, 161, 0.5);
    }

    .strobe-copy {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .strobe-copy strong {
      color: #f8fbff;
      font-size: clamp(1rem, 4vw, 1.25rem);
      text-align: center;
    }

    .view-strobe .needle-view {
      display: none;
    }

    .view-strobe .strobe-view {
      display: grid;
    }

    .string-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 1px 0 3px;
      scrollbar-width: thin;
    }

    .string-button {
      min-width: 70px;
      display: grid;
      gap: 2px;
      padding: 8px 10px;
      border-color: rgba(255, 255, 255, 0.12);
      text-align: center;
    }

    .string-button strong {
      font-size: 1rem;
      line-height: 1;
    }

    .string-button span {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 760;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .string-button.active {
      border-color: rgba(65, 216, 255, 0.72);
      background: linear-gradient(135deg, rgba(22, 140, 230, 0.28), rgba(134, 39, 216, 0.24));
      box-shadow: 0 0 0 3px rgba(65, 216, 255, 0.09);
    }

    .panel {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-section {
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
      color: #f8fbff;
      font-size: 0.9rem;
      font-weight: 850;
      letter-spacing: 0.02em;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-button {
      display: grid;
      place-items: center;
      gap: 3px;
      padding: 9px;
      font-weight: 820;
      text-align: center;
    }

    .mode-button svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.2;
    }

    .mode-button.active {
      border-color: rgba(65, 216, 255, 0.72);
      background: linear-gradient(135deg, rgba(22, 140, 230, 0.28), rgba(134, 39, 216, 0.24));
    }

    .mode-button small {
      color: var(--subtle);
      font-size: 0.66rem;
      font-weight: 780;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .control-grid {
      display: grid;
      gap: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .calibration-row {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 8px;
      align-items: end;
    }

    .calibration-row .field {
      min-width: 0;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      padding: 0;
    }

    .icon-button svg {
      width: 20px;
      height: 20px;
    }

    .start-button {
      width: 100%;
      min-height: 54px;
      border-color: rgba(65, 216, 255, 0.34);
      color: #06111c;
      background: linear-gradient(105deg, var(--cyan), #7df0ca);
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(65, 216, 255, 0.18);
    }

    .start-button:hover {
      color: #06111c;
      background: linear-gradient(105deg, #72e3ff, #94f5d5);
    }

    .secondary-action {
      width: 100%;
      font-weight: 820;
    }

    .string-editor {
      display: grid;
      gap: 8px;
    }

    .string-row {
      display: grid;
      grid-template-columns: minmax(52px, 0.74fr) minmax(72px, 1fr) 42px;
      gap: 8px;
      align-items: end;
    }

    .string-row input {
      padding: 0 10px;
    }

    .remove-string {
      min-height: 44px;
      color: #ffd5dd;
      background: rgba(255, 111, 134, 0.1);
    }

    .add-string {
      width: 100%;
      margin-top: 2px;
      font-weight: 820;
    }

    .quality {
      display: grid;
      gap: 9px;
    }

    .quality-bar {
      position: relative;
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .quality-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--red), var(--amber), var(--green));
      transition: width 140ms ease;
    }

    .hint-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hint {
      min-height: 62px;
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.05);
    }

    .hint span {
      color: var(--subtle);
      font-size: 0.68rem;
      font-weight: 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hint strong {
      color: #f8fbff;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .future-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .future-toggle strong {
      display: block;
      color: #f8fbff;
      font-size: 0.86rem;
    }

    .future-toggle span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .switch {
      position: relative;
      flex: 0 0 auto;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      opacity: 0.46;
    }

    .switch::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
    }

    .footer-space {
      min-height: 4px;
    }

    @media (max-width: 390px) {
      .readout {
        grid-template-columns: 1fr;
      }

      .mini-stat:last-child {
        text-align: left;
      }

      .note-badge {
        grid-row: 1;
      }

      .two-col,
      .hint-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 760px) {
      .app {
        padding: 20px;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr) 340px;
        align-items: start;
      }

      .topbar {
        grid-column: 1 / -1;
      }

      .meter {
        min-height: calc(100vh - 40px - 68px);
        padding: 22px;
      }

      .controls {
        position: sticky;
        top: 20px;
        max-height: calc(100vh - 40px);
        overflow: auto;
        padding-right: 2px;
      }
    }

    @media (min-width: 1080px) {
      .shell {
        grid-template-columns: minmax(0, 1fr) 380px;
      }

      .brand img {
        width: 208px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <header class="topbar">
        <div class="brand" aria-label="Shane Ward Music">
          <img src="swm-logo.png" alt="Shane Ward Music" />
          <div class="brand-mark">
            <div class="brand-title">Tuner</div>
          </div>
        </div>
        <div class="status-pill" id="statusPill">
          <span class="status-dot"></span>
          <span id="statusText">Idle</span>
        </div>
      </header>

      <section class="tuner-stage view-needle" id="tunerStage" aria-label="Tuner display">
        <div class="meter">
          <div class="readout">
            <div class="mini-stat">
              <span>Input</span>
              <strong id="inputHz">-- Hz</strong>
            </div>
            <div class="note-badge" aria-live="polite">
              <div class="note-name" id="noteName">--</div>
              <div class="octave" id="noteOctave">Target</div>
            </div>
            <div class="mini-stat">
              <span>Target</span>
              <strong id="targetHz">-- Hz</strong>
            </div>
          </div>

          <div class="needle-view">
            <div class="gauge">
              <div class="ticks" aria-hidden="true">
                <span class="tick major" style="--angle:-60deg"></span>
                <span class="tick" style="--angle:-48deg"></span>
                <span class="tick" style="--angle:-36deg"></span>
                <span class="tick major" style="--angle:-24deg"></span>
                <span class="tick" style="--angle:-12deg"></span>
                <span class="tick center" style="--angle:0deg"></span>
                <span class="tick" style="--angle:12deg"></span>
                <span class="tick major" style="--angle:24deg"></span>
                <span class="tick" style="--angle:36deg"></span>
                <span class="tick" style="--angle:48deg"></span>
                <span class="tick major" style="--angle:60deg"></span>
              </div>
              <div class="needle" id="needle"></div>
            </div>
            <div class="cents-row">
              <span>Flat</span>
              <span id="centsText">-- cents</span>
              <span>Sharp</span>
            </div>
          </div>

          <div class="strobe-view">
            <div class="strobe-window">
              <div class="strobe-band" id="strobeBand"></div>
              <div class="strobe-center"></div>
            </div>
            <div class="strobe-copy">
              <span>Flat</span>
              <strong id="strobeText">Hold centre</strong>
              <span>Sharp</span>
            </div>
          </div>

          <div class="string-strip" id="stringStrip" aria-label="String targets"></div>
        </div>
      </section>

      <aside class="controls" aria-label="Tuner controls">
        <section class="panel control-section">
          <div class="section-title">Mode</div>
          <div class="mode-grid">
            <button class="mode-button active" type="button" data-view="needle" aria-pressed="true" title="Needle view">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 19a8 8 0 0 1 16 0" stroke="currentColor" stroke-linecap="round"/>
                <path d="m12 19 4-8" stroke="currentColor" stroke-linecap="round"/>
                <path d="M12 19h.01" stroke="currentColor" stroke-linecap="round"/>
              </svg>
              Needle
            </button>
            <button class="mode-button" type="button" data-view="strobe" aria-pressed="false" title="Strobe view">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-linecap="round"/>
                <path d="M8 4v16M16 4v16" stroke="currentColor" stroke-linecap="round" opacity=".55"/>
              </svg>
              Strobe
            </button>
          </div>
        </section>

        <section class="panel control-section">
          <div class="section-title">Input</div>
          <button class="start-button" type="button" id="startButton">Start Microphone</button>
          <div class="quality" style="margin-top: 12px;">
            <div class="quality-bar" aria-hidden="true"><div class="quality-fill" id="qualityFill"></div></div>
            <div class="hint-grid">
              <div class="hint">
                <span>Signal</span>
                <strong id="signalText">--</strong>
              </div>
              <div class="hint">
                <span>Lock</span>
                <strong id="lockText">--</strong>
              </div>
            </div>
          </div>
        </section>

        <section class="panel control-section">
          <div class="section-title">Setup</div>
          <div class="control-grid">
            <div class="two-col">
              <div class="field">
                <label for="instrumentSelect">Instrument</label>
                <select id="instrumentSelect"></select>
              </div>
              <div class="field">
                <label for="tuningSelect">Tuning</label>
                <select id="tuningSelect"></select>
              </div>
            </div>
            <div class="calibration-row">
              <button class="icon-button" type="button" id="baseDown" title="Lower base frequency">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
              </button>
              <div class="field">
                <label for="baseFrequency">Base A4</label>
                <input id="baseFrequency" type="number" min="400" max="480" step="0.1" value="440" inputmode="decimal" />
              </div>
              <button class="icon-button" type="button" id="baseUp" title="Raise base frequency">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>
        </section>

        <section class="panel control-section" id="customPanel">
          <div class="section-title">
            <span>Strings</span>
            <button class="icon-button" type="button" id="addString" title="Add string">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="string-editor" id="stringEditor"></div>
          <button class="add-string" type="button" id="useCustom">Use Custom Tuning</button>
        </section>

        <section class="panel control-section">
          <div class="section-title">Roadmap</div>
          <div class="future-toggle" aria-disabled="true">
            <div>
              <strong>Polyphonic</strong>
              <span>Reserved for multi-string detection.</span>
            </div>
            <span class="switch" aria-hidden="true"></span>
          </div>
        </section>

        <div class="footer-space"></div>
      </aside>
    </div>
  </main>

  <script>
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    const PRESETS = {
      "Guitar": {
        "Standard": ["E2", "A2", "D3", "G3", "B3", "E4"],
        "Drop D": ["D2", "A2", "D3", "G3", "B3", "E4"],
        "D Standard": ["D2", "G2", "C3", "F3", "A3", "D4"],
        "Open G": ["D2", "G2", "D3", "G3", "B3", "D4"],
        "Baritone": ["B1", "E2", "A2", "D3", "F#3", "B3"]
      },
      "Bass": {
        "4 String": ["E1", "A1", "D2", "G2"],
        "5 String": ["B0", "E1", "A1", "D2", "G2"],
        "Drop D": ["D1", "A1", "D2", "G2"],
        "BEAD": ["B0", "E1", "A1", "D2"]
      },
      "Ukulele": {
        "Soprano": ["G4", "C4", "E4", "A4"],
        "Low G": ["G3", "C4", "E4", "A4"],
        "Baritone": ["D3", "G3", "B3", "E4"]
      },
      "Violin": {
        "Standard": ["G3", "D4", "A4", "E5"]
      },
      "Viola": {
        "Standard": ["C3", "G3", "D4", "A4"]
      },
      "Cello": {
        "Standard": ["C2", "G2", "D3", "A3"]
      },
      "Mandolin": {
        "Standard": ["G3", "D4", "A4", "E5"]
      },
      "Custom": {
        "Custom": ["E2", "A2", "D3", "G3", "B3", "E4"]
      }
    };

    const state = {
      audioContext: null,
      analyser: null,
      mediaStream: null,
      buffer: null,
      running: false,
      rafId: 0,
      baseFrequency: 440,
      instrument: "Guitar",
      tuning: "Standard",
      strings: PRESETS.Guitar.Standard.map((note) => ({ note })),
      selectedString: 0,
      cents: 0,
      frequency: 0,
      clarity: 0,
      strobeOffset: 0,
      permissionPrimed: false,
      permissionPriming: false,
      lastPitchTime: 0,
      lastFrameTime: performance.now()
    };

    const els = {
      stage: document.getElementById("tunerStage"),
      statusPill: document.getElementById("statusPill"),
      statusText: document.getElementById("statusText"),
      startButton: document.getElementById("startButton"),
      instrumentSelect: document.getElementById("instrumentSelect"),
      tuningSelect: document.getElementById("tuningSelect"),
      baseFrequency: document.getElementById("baseFrequency"),
      baseDown: document.getElementById("baseDown"),
      baseUp: document.getElementById("baseUp"),
      inputHz: document.getElementById("inputHz"),
      targetHz: document.getElementById("targetHz"),
      noteName: document.getElementById("noteName"),
      noteOctave: document.getElementById("noteOctave"),
      centsText: document.getElementById("centsText"),
      strobeText: document.getElementById("strobeText"),
      needle: document.getElementById("needle"),
      strobeBand: document.getElementById("strobeBand"),
      stringStrip: document.getElementById("stringStrip"),
      stringEditor: document.getElementById("stringEditor"),
      addString: document.getElementById("addString"),
      useCustom: document.getElementById("useCustom"),
      qualityFill: document.getElementById("qualityFill"),
      signalText: document.getElementById("signalText"),
      lockText: document.getElementById("lockText")
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function parseNote(note) {
      const match = /^([A-G])([#b]?)(-?\d+)$/.exec(note.trim());
      if (!match) return null;
      const [, letter, accidental, octaveText] = match;
      const normalized = accidental === "b" ? flatToSharp(letter) : `${letter}${accidental}`;
      const index = NOTE_NAMES.indexOf(normalized);
      if (index === -1) return null;
      return { index, octave: Number(octaveText), name: normalized };
    }

    function flatToSharp(letter) {
      return {
        C: "B",
        D: "C#",
        E: "D#",
        F: "E",
        G: "F#",
        A: "G#",
        B: "A#"
      }[letter];
    }

    function midiFromNote(note) {
      const parsed = parseNote(note);
      if (!parsed) return null;
      return (parsed.octave + 1) * 12 + parsed.index;
    }

    function noteFromMidi(midi) {
      const rounded = Math.round(midi);
      const index = ((rounded % 12) + 12) % 12;
      const octave = Math.floor(rounded / 12) - 1;
      return `${NOTE_NAMES[index]}${octave}`;
    }

    function frequencyFromNote(note) {
      const midi = midiFromNote(note);
      if (midi === null) return null;
      return state.baseFrequency * Math.pow(2, (midi - 69) / 12);
    }

    function centsBetween(frequency, target) {
      return 1200 * Math.log2(frequency / target);
    }

    function nearestString(frequency) {
      let best = state.strings[0];
      let bestIndex = 0;
      let bestDistance = Infinity;
      state.strings.forEach((string, index) => {
        const target = frequencyFromNote(string.note);
        if (!target) return;
        const distance = Math.abs(centsBetween(frequency, target));
        if (distance < bestDistance) {
          best = string;
          bestIndex = index;
          bestDistance = distance;
        }
      });
      return { string: best, index: bestIndex, distance: bestDistance };
    }

    function setStatus(text, active = false) {
      els.statusText.textContent = text;
      els.statusPill.classList.toggle("active", active);
    }

    function micConstraints() {
      return {
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      };
    }

    function canUseMicrophone() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      return Boolean(AudioContext && navigator.mediaDevices?.getUserMedia);
    }

    function requestMicStream() {
      return navigator.mediaDevices.getUserMedia(micConstraints());
    }

    function stopStream(stream) {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    }

    function handleMicUnavailable() {
      const insecure = window.isSecureContext === false;
      setStatus(insecure ? "HTTPS needed" : "Unsupported");
      els.signalText.textContent = insecure ? "Blocked" : "No input";
      els.lockText.textContent = insecure ? "Secure URL" : "Browser";
      els.startButton.textContent = insecure ? "Needs HTTPS" : "Unavailable";
    }

    function handleMicError(error, autoRequest = false) {
      const name = error?.name || "";
      if (window.isSecureContext === false) {
        handleMicUnavailable();
        return;
      }

      if (autoRequest && (name === "NotAllowedError" || name === "SecurityError")) {
        setStatus("Tap to allow");
        els.signalText.textContent = "Permission";
        els.lockText.textContent = "Tap Start";
        els.startButton.textContent = "Start Microphone";
        return;
      }

      if (name === "NotFoundError" || name === "DevicesNotFoundError") {
        setStatus("No mic");
        els.signalText.textContent = "No input";
        els.lockText.textContent = "Device";
        return;
      }

      if (name === "NotAllowedError" || name === "SecurityError") {
        setStatus("Mic denied");
        els.signalText.textContent = "Blocked";
        els.lockText.textContent = "Permission";
        return;
      }

      setStatus("Mic blocked");
      els.signalText.textContent = "No input";
      els.lockText.textContent = "Permission";
    }

    async function primeMicrophonePermission() {
      if (state.running || state.permissionPriming) return;
      if (!canUseMicrophone()) {
        handleMicUnavailable();
        return;
      }

      state.permissionPriming = true;
      setStatus("Allow mic");
      els.signalText.textContent = "Permission";
      els.lockText.textContent = "Prompt";

      try {
        const stream = await requestMicStream();
        stopStream(stream);
        state.permissionPrimed = true;
        setStatus("Mic ready");
        els.signalText.textContent = "Ready";
        els.lockText.textContent = "Allowed";
        els.startButton.textContent = "Start Tuner";
      } catch (error) {
        handleMicError(error, true);
      } finally {
        state.permissionPriming = false;
      }
    }

    function renderInstrumentOptions() {
      els.instrumentSelect.innerHTML = Object.keys(PRESETS)
        .map((instrument) => `<option value="${instrument}">${instrument}</option>`)
        .join("");
      els.instrumentSelect.value = state.instrument;
      renderTuningOptions();
    }

    function renderTuningOptions() {
      const tunings = Object.keys(PRESETS[state.instrument]);
      els.tuningSelect.innerHTML = tunings
        .map((tuning) => `<option value="${tuning}">${tuning}</option>`)
        .join("");
      if (!tunings.includes(state.tuning)) {
        state.tuning = tunings[0];
      }
      els.tuningSelect.value = state.tuning;
    }

    function applyPreset() {
      const preset = PRESETS[state.instrument][state.tuning];
      state.strings = preset.map((note) => ({ note }));
      state.selectedString = clamp(state.selectedString, 0, state.strings.length - 1);
      renderStrings();
      updateTargetReadout();
    }

    function renderStrings() {
      els.stringStrip.innerHTML = "";
      state.strings.forEach((string, index) => {
        const button = document.createElement("button");
        button.className = `string-button${index === state.selectedString ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `<strong>${string.note}</strong><span>String ${index + 1}</span>`;
        button.addEventListener("click", () => {
          state.selectedString = index;
          updateTargetReadout();
          renderStrings();
        });
        els.stringStrip.append(button);
      });

      els.stringEditor.innerHTML = "";
      state.strings.forEach((string, index) => {
        const row = document.createElement("div");
        row.className = "string-row";
        row.innerHTML = `
          <div class="field">
            <label for="stringName${index}">String</label>
            <input id="stringName${index}" value="${index + 1}" aria-label="String number ${index + 1}" disabled />
          </div>
          <div class="field">
            <label for="stringNote${index}">Note</label>
            <input id="stringNote${index}" value="${string.note}" inputmode="text" autocomplete="off" />
          </div>
          <button class="remove-string icon-button" type="button" title="Remove string" aria-label="Remove string ${index + 1}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        const input = row.querySelector(`#stringNote${index}`);
        input.addEventListener("change", () => {
          const cleaned = normalizeNoteInput(input.value);
          if (cleaned) {
            state.strings[index].note = cleaned;
            input.value = cleaned;
            state.instrument = "Custom";
            state.tuning = "Custom";
            PRESETS.Custom.Custom = state.strings.map(({ note }) => note);
            els.instrumentSelect.value = "Custom";
            renderTuningOptions();
            updateTargetReadout();
            renderStrings();
          } else {
            input.value = state.strings[index].note;
          }
        });
        row.querySelector(".remove-string").addEventListener("click", () => {
          if (state.strings.length <= 1) return;
          state.strings.splice(index, 1);
          state.selectedString = clamp(state.selectedString, 0, state.strings.length - 1);
          state.instrument = "Custom";
          state.tuning = "Custom";
          PRESETS.Custom.Custom = state.strings.map(({ note }) => note);
          els.instrumentSelect.value = "Custom";
          renderTuningOptions();
          renderStrings();
          updateTargetReadout();
        });
        els.stringEditor.append(row);
      });
    }

    function normalizeNoteInput(value) {
      const compact = value.trim().replace(/\s+/g, "");
      if (!compact) return null;
      const letter = compact[0]?.toUpperCase();
      const rest = compact.slice(1);
      const match = /^([#b]?)(-?\d+)$/.exec(rest);
      if (!/[A-G]/.test(letter) || !match) return null;
      const note = `${letter}${match[1]}${match[2]}`;
      return midiFromNote(note) === null ? null : note;
    }

    function updateTargetReadout() {
      const string = state.strings[state.selectedString] || state.strings[0];
      const target = frequencyFromNote(string.note);
      const parsed = parseNote(string.note);
      els.targetHz.textContent = target ? `${target.toFixed(2)} Hz` : "-- Hz";
      els.noteName.textContent = parsed ? parsed.name : "--";
      els.noteOctave.textContent = parsed ? `Octave ${parsed.octave}` : "Target";
    }

    function updateTunerDisplay(frequency, clarity) {
      state.frequency = frequency || 0;
      state.clarity = clarity || 0;

      if (!frequency) {
        els.inputHz.textContent = "-- Hz";
        els.centsText.textContent = "-- cents";
        els.strobeText.textContent = "Hold centre";
        els.signalText.textContent = state.running ? "Listening" : "--";
        els.lockText.textContent = "--";
        els.qualityFill.style.width = "0%";
        els.needle.style.setProperty("--needle-angle", "0deg");
        return;
      }

      const nearest = nearestString(frequency);
      if (nearest.string && nearest.index !== state.selectedString && nearest.distance < 80) {
        state.selectedString = nearest.index;
        renderStrings();
      }

      const target = frequencyFromNote(state.strings[state.selectedString].note);
      const cents = target ? centsBetween(frequency, target) : 0;
      state.cents = cents;

      const absoluteCents = Math.abs(cents);
      const displayCents = clamp(cents, -50, 50);
      const needleAngle = displayCents * 1.2;
      const quality = clamp((clarity - 0.55) / 0.35, 0, 1);
      const lockText = absoluteCents <= 3 ? "In tune" : absoluteCents <= 12 ? "Close" : cents < 0 ? "Flat" : "Sharp";

      els.inputHz.textContent = `${frequency.toFixed(2)} Hz`;
      els.centsText.textContent = `${cents > 0 ? "+" : ""}${cents.toFixed(1)} cents`;
      els.strobeText.textContent = `${cents > 0 ? "+" : ""}${cents.toFixed(1)} cents`;
      els.signalText.textContent = clarity > 0.75 ? "Strong" : clarity > 0.58 ? "Stable" : "Weak";
      els.lockText.textContent = lockText;
      els.qualityFill.style.width = `${Math.round(quality * 100)}%`;
      els.needle.style.setProperty("--needle-angle", `${needleAngle}deg`);
      updateTargetReadout();
    }

    async function startAudio() {
      if (state.permissionPriming) return;
      if (state.running) {
        stopAudio();
        return;
      }

      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!canUseMicrophone()) {
          handleMicUnavailable();
          return;
        }

        state.audioContext = new AudioContext();
        state.mediaStream = await requestMicStream();

        const source = state.audioContext.createMediaStreamSource(state.mediaStream);
        await state.audioContext.resume();
        state.analyser = state.audioContext.createAnalyser();
        state.analyser.fftSize = 4096;
        state.analyser.smoothingTimeConstant = 0;
        state.buffer = new Float32Array(state.analyser.fftSize);
        source.connect(state.analyser);
        state.running = true;
        state.permissionPrimed = true;
        els.startButton.textContent = "Stop Microphone";
        setStatus("Listening", true);
        state.lastPitchTime = 0;
        state.lastFrameTime = performance.now();
        tick();
      } catch (error) {
        stopStream(state.mediaStream);
        if (state.audioContext) {
          state.audioContext.close();
        }
        state.audioContext = null;
        state.mediaStream = null;
        state.analyser = null;
        state.buffer = null;
        handleMicError(error, false);
      }
    }

    function stopAudio() {
      cancelAnimationFrame(state.rafId);
      state.running = false;
      if (state.mediaStream) {
        state.mediaStream.getTracks().forEach((track) => track.stop());
      }
      if (state.audioContext) {
        state.audioContext.close();
      }
      state.audioContext = null;
      state.mediaStream = null;
      state.analyser = null;
      state.buffer = null;
      els.startButton.textContent = "Start Microphone";
      setStatus("Idle");
      updateTunerDisplay(0, 0);
    }

    function tick(now = performance.now()) {
      if (!state.running || !state.analyser || !state.buffer) return;
      if (now - state.lastPitchTime >= 36) {
        state.analyser.getFloatTimeDomainData(state.buffer);
        const result = detectPitch(state.buffer, state.audioContext.sampleRate);
        updateTunerDisplay(result.frequency, result.clarity);
        state.lastPitchTime = now;
      }
      animateStrobe(now);
      state.rafId = requestAnimationFrame(tick);
    }

    function animateStrobe(now) {
      const elapsed = Math.min(0.05, (now - state.lastFrameTime) / 1000);
      state.lastFrameTime = now;
      const speed = clamp(state.cents, -50, 50) * -2.1;
      state.strobeOffset = (state.strobeOffset + speed * elapsed) % 44;
      els.strobeBand.style.setProperty("--offset", `${state.strobeOffset}px`);
    }

    function detectPitch(buffer, sampleRate) {
      let rms = 0;
      for (let i = 0; i < buffer.length; i += 1) {
        rms += buffer[i] * buffer[i];
      }
      rms = Math.sqrt(rms / buffer.length);
      if (rms < 0.012) return { frequency: 0, clarity: 0 };

      const minFrequency = 28;
      const maxFrequency = 1600;
      const minLag = Math.floor(sampleRate / maxFrequency);
      const maxLag = Math.min(Math.floor(sampleRate / minFrequency), buffer.length - 1);
      let bestLag = -1;
      let bestCorrelation = 0;

      for (let lag = minLag; lag <= maxLag; lag += 1) {
        let sum = 0;
        let energyA = 0;
        let energyB = 0;
        for (let i = 0; i < buffer.length - lag; i += 1) {
          const a = buffer[i];
          const b = buffer[i + lag];
          sum += a * b;
          energyA += a * a;
          energyB += b * b;
        }
        const correlation = sum / Math.sqrt(energyA * energyB);
        if (correlation > bestCorrelation) {
          bestCorrelation = correlation;
          bestLag = lag;
        }
      }

      if (bestLag === -1 || bestCorrelation < 0.45) {
        return { frequency: 0, clarity: clamp(bestCorrelation, 0, 1) };
      }

      const refinedLag = refineLag(buffer, bestLag);
      const frequency = sampleRate / refinedLag;
      return { frequency, clarity: clamp(bestCorrelation, 0, 1) };
    }

    function refineLag(buffer, lag) {
      if (lag <= 1 || lag >= buffer.length - 2) return lag;
      const previous = correlationAtLag(buffer, lag - 1);
      const current = correlationAtLag(buffer, lag);
      const next = correlationAtLag(buffer, lag + 1);
      const divisor = previous - 2 * current + next;
      if (Math.abs(divisor) < 0.0001) return lag;
      return lag + 0.5 * (previous - next) / divisor;
    }

    function correlationAtLag(buffer, lag) {
      let sum = 0;
      for (let i = 0; i < buffer.length - lag; i += 1) {
        sum += buffer[i] * buffer[i + lag];
      }
      return sum;
    }

    function setView(view) {
      els.stage.classList.toggle("view-strobe", view === "strobe");
      els.stage.classList.toggle("view-needle", view === "needle");
      document.querySelectorAll(".mode-button[data-view]").forEach((button) => {
        const active = button.dataset.view === view;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function bindEvents() {
      els.startButton.addEventListener("click", startAudio);
      els.instrumentSelect.addEventListener("change", () => {
        state.instrument = els.instrumentSelect.value;
        state.tuning = Object.keys(PRESETS[state.instrument])[0];
        renderTuningOptions();
        applyPreset();
      });
      els.tuningSelect.addEventListener("change", () => {
        state.tuning = els.tuningSelect.value;
        applyPreset();
      });
      els.baseFrequency.addEventListener("input", () => {
        state.baseFrequency = clamp(Number(els.baseFrequency.value) || 440, 400, 480);
        updateTargetReadout();
      });
      els.baseDown.addEventListener("click", () => changeBase(-0.5));
      els.baseUp.addEventListener("click", () => changeBase(0.5));
      els.addString.addEventListener("click", () => {
        state.strings.push({ note: noteFromMidi(64 + state.strings.length * 5) });
        state.instrument = "Custom";
        state.tuning = "Custom";
        PRESETS.Custom.Custom = state.strings.map(({ note }) => note);
        els.instrumentSelect.value = "Custom";
        renderTuningOptions();
        renderStrings();
        updateTargetReadout();
      });
      els.useCustom.addEventListener("click", () => {
        state.instrument = "Custom";
        state.tuning = "Custom";
        PRESETS.Custom.Custom = state.strings.map(({ note }) => note);
        els.instrumentSelect.value = "Custom";
        renderTuningOptions();
        applyPreset();
      });
      document.querySelectorAll(".mode-button[data-view]").forEach((button) => {
        button.addEventListener("click", () => setView(button.dataset.view));
      });
      window.addEventListener("pagehide", stopAudio);
    }

    function changeBase(amount) {
      const next = clamp((Number(els.baseFrequency.value) || 440) + amount, 400, 480);
      state.baseFrequency = next;
      els.baseFrequency.value = next.toFixed(1);
      updateTargetReadout();
    }

    function init() {
      renderInstrumentOptions();
      renderStrings();
      updateTargetReadout();
      bindEvents();
      updateTunerDisplay(0, 0);
      window.setTimeout(primeMicrophonePermission, 250);
    }

    init();
  </script>
</body>
</html>
